name: Refresh prices & publish

on:
  schedule:
    # Every 10 minutes. GitHub's floor is 5, but scheduled runs are delayed
    # under load, so a tighter cron buys little and triples scraping load.
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches: [master]

# Only one refresh at a time; a queued run supersedes a pending one.
concurrency:
  group: refresh
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Collect prices
        run: node refresh-once.js

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only history.json is versioned. latest.json is regenerated every run
          # and is ~10x larger, so committing it every 10 minutes would add
          # hundreds of MB to the repo before the trip is over. The site gets it
          # from the build below, not from git.
          git add data/history.json data/schedule.json data/venues
          if git diff --staged --quiet; then
            echo "no change"
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            # A manual push can land between checkout and commit. data/*.json is
            # regenerated every run, so on conflict the freshly collected copy
            # always wins (-X theirs favours the commit being replayed).
            for attempt in 1 2 3; do
              git fetch origin master
              git rebase -X theirs origin/master || { git rebase --abort; exit 1; }
              git push origin HEAD:master && break
              echo "push race, retry $attempt"
            done
          fi

      - name: Assemble site
        run: |
          mkdir -p _site/data/venues
          cp -r public/* _site/
          cp data/latest.json _site/data/
          # Cached venue seat-map geometry (venue-fixed, lazy-loaded by the page)
          cp data/venues/*.json _site/data/venues/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
